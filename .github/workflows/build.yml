name: Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  linux:
    name: Linux Qt 6
    runs-on: ubuntu-latest
    container: archlinux:base-devel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            cmake \
            gcc \
            ninja \
            qt6-base \
            qt6-tools \
            libsodium \
            libsecret

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build build --parallel

      - name: Install into artifact tree
        run: |
          cmake --install build --prefix "$PWD/app"
          tar -C app -czf qt-notes-linux-x86_64.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qt-notes-linux-x86_64
          path: qt-notes-linux-x86_64.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: linux
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: qt-notes-linux-x86_64
          path: dist

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          ASSET="dist/qt-notes-linux-x86_64.tar.gz"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET" --clobber
          else
            gh release create "$TAG" "$ASSET" \
              --title "$TAG" \
              --notes "Automated release for $TAG."
          fi
